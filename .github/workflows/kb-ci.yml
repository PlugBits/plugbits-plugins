name: kb-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/**"
      - "tools/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "tools/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

concurrency:
  group: kb-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) コード＆ルールチェック（ESLint + CSS/HTML混入チェック）
  kb-rules-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      - name: Run code & plugin checks
        run: npm run check   # ← ここで eslint と kb-check-css をまとめて実行

  # 2) ビルド（各プラグインの build を横断実行）
  build:
    runs-on: ubuntu-latest
    needs: [kb-rules-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      - name: Build workspace
        run: npm run build   # ルートの workspaces 経由で各プラグインの build

  # 3) ZIP 生成＆ZIP 内整合性検査（manifest と実ファイル）
  #
  # 【現在は無効】Pack はローカルで実施する運用のため、このジョブは既定でスキップされる。
  #   ・スキップ条件: リポジトリ変数 ENABLE_PACK_VERIFY が 'true' でない限り実行されない。
  #   ・オンラインで復帰させる手順:
  #       1. Repo Settings → Secrets and variables → Actions → Variables で
  #          ENABLE_PACK_VERIFY = true を追加（これだけで下記ジョブが再度動く）。
  #       2. 署名付き zip を配布用に生成したい場合は、各 .ppk を Secrets に登録し、
  #          npm run verify の前に .keys/ へ復元するステップを追加する
  #          （鍵が無い場合、pack-plugin.mjs は missing private key で失敗する）。
  pack-and-verify:
    if: ${{ vars.ENABLE_PACK_VERIFY == 'true' }}
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      - name: Pack and verify zips
        run: npm run verify  # pack 実行後に kb-zip-verify を実行
      - name: Upload dist zips (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist
          path: |
            plugins/**/dist/*.zip
          if-no-files-found: warn
