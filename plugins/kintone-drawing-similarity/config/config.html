<section class="pb-config">
  <h1>類似図面検索 設定</h1>

  <label class="pb-field">
    <span>API Base URL</span>
    <input id="apiBaseUrl" type="url" placeholder="https://drawing-similarity.example.run.app" />
  </label>

  <label class="pb-field">
    <span>テナントID</span>
    <input id="tenantId" type="text" placeholder="default" />
  </label>

  <label class="pb-field">
    <span>図番フィールドコード</span>
    <input id="drawingNoField" type="text" placeholder="図番" />
  </label>

  <label class="pb-field">
    <span>品名フィールドコード</span>
    <input id="productNameField" type="text" placeholder="品名" />
  </label>

  <label class="pb-field">
    <span>PDFファイルフィールドコード</span>
    <input id="pdfFileField" type="text" placeholder="PDF" />
  </label>

  <label class="pb-field">
    <span>加工方法フィールドコード</span>
    <input id="processField" type="text" placeholder="加工方法" />
  </label>

  <label class="pb-field">
    <span>タグフィールドコード</span>
    <input id="tagsField" type="text" placeholder="タグ" />
  </label>

  <label class="pb-field">
    <span>加工方法 選択肢（カンマ区切り）</span>
    <input id="processOptions" type="text" placeholder="旋削,フライス,板金,研磨,溶接" />
  </label>

  <div class="pb-actions">
    <button id="save" type="button">保存</button>
    <button id="cancel" type="button">キャンセル</button>
  </div>
</section>
