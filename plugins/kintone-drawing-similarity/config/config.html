<section class="pb-config">
  <header class="pb-config-header">
    <div class="pb-config-brand">
      <span class="pb-config-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      </span>
      <div>
        <h1>類似図面検索</h1>
        <p class="pb-config-sub">プラグイン設定</p>
      </div>
    </div>
  </header>

  <div class="pb-card">
    <div class="pb-card-head">
      <h2>接続</h2>
      <p>API エンドポイントと認証情報を設定します。</p>
    </div>
    <div class="pb-card-body">
      <label class="pb-field">
        <span>API Key（テナント認証キー）</span>
        <input id="apiKey" type="password" placeholder="テナントに割り当てたAPIキーを入力" autocomplete="new-password" />
      </label>

      <label class="pb-field">
        <span>テナントID<em class="pb-hint">kintoneドメインから自動判定</em></span>
        <input id="tenantId" type="text" readonly />
      </label>

      <div class="pb-test-row">
        <button id="testConnection" type="button" class="pb-btn pb-btn-ghost">接続テスト</button>
        <span id="testStatus" class="pb-test-status" hidden></span>
      </div>
    </div>
  </div>

  <div class="pb-card">
    <div class="pb-card-head">
      <h2>フィールド設定<span class="pb-badge pb-badge-req">必須</span></h2>
      <p>図面レコードの主要フィールドを対応付けます。</p>
    </div>
    <div class="pb-card-body pb-grid">
      <label class="pb-field">
        <span>図番フィールドコード</span>
        <select id="drawingNoField"></select>
      </label>

      <label class="pb-field">
        <span>品名フィールドコード</span>
        <select id="productNameField"></select>
      </label>

      <label class="pb-field">
        <span>PDFファイルフィールドコード</span>
        <select id="pdfFileField"></select>
      </label>

      <label class="pb-field">
        <span>加工方法フィールドコード</span>
        <select id="processField"></select>
      </label>
    </div>
  </div>

  <div class="pb-card">
    <div class="pb-card-head">
      <h2>フィールド設定<span class="pb-badge">任意</span></h2>
      <p>スコア補正やタグ機能に使うフィールド（未設定でも動作します）。</p>
    </div>
    <div class="pb-card-body pb-grid">
      <label class="pb-field">
        <span>材質フィールドコード</span>
        <select id="materialField"></select>
      </label>

      <label class="pb-field">
        <span>寸法（板厚/外径）フィールドコード</span>
        <select id="dimensionField"></select>
      </label>

      <label class="pb-field">
        <span>タグフィールドコード</span>
        <select id="tagField"></select>
      </label>

      <label class="pb-field">
        <span>AI形状タグフィールドコード</span>
        <select id="shapeTagField"></select>
      </label>

      <label class="pb-field">
        <span>タグスペース要素ID</span>
        <input id="tagSpaceId" type="text" placeholder="pb_tags" />
      </label>

      <label class="pb-field">
        <span>加工方法 選択肢<em class="pb-hint">カンマ区切り</em></span>
        <input id="processOptions" type="text" placeholder="旋削,フライス,板金,研磨,溶接" />
      </label>

      <label class="pb-field">
        <span>検索結果に表示する追加フィールド<em class="pb-hint">カンマ区切り</em></span>
        <input id="resultDetailFields" type="text" placeholder="見積単価,加工工程,最終受注日" />
        <div class="pb-hint" style="margin-top: -2px;">カンマ区切りでフィールドコードを指定（例: 見積単価,加工工程,最終受注日）。指定したフィールドの値が類似検索結果カードに表示されます。</div>
      </label>
    </div>
  </div>

  <div class="pb-card">
    <div class="pb-card-head">
      <h2>表示設定</h2>
      <p>画面に表示するボタンや情報を制御します。</p>
    </div>
    <div class="pb-card-body">
      <label class="pb-toggle">
        <input id="showBulkButton" type="checkbox" />
        <span class="pb-toggle-track"><span class="pb-toggle-thumb"></span></span>
        <span class="pb-toggle-text">
          <span class="pb-toggle-title">「一括図面登録」ボタンを表示</span>
          <span class="pb-toggle-desc">オフにすると一覧画面のヘッダーから一括登録ボタンを隠します。</span>
        </span>
      </label>

      <label class="pb-toggle" style="margin-top: 16px;">
        <input id="showDebugInfo" type="checkbox" />
        <span class="pb-toggle-track"><span class="pb-toggle-thumb"></span></span>
        <span class="pb-toggle-text">
          <span class="pb-toggle-title">デバッグ情報を表示</span>
          <span class="pb-toggle-desc">検索結果にベクトルスコアの生値・回転・スコア内訳などの開発者向け情報を表示します。</span>
        </span>
      </label>

      <label class="pb-toggle" style="margin-top: 16px;">
        <input id="showArchiveButton" type="checkbox" />
        <span class="pb-toggle-track"><span class="pb-toggle-thumb"></span></span>
        <span class="pb-toggle-text">
          <span class="pb-toggle-title">「過去図面アーカイブ取り込み」を表示</span>
          <span class="pb-toggle-desc">kintoneに登録せず、フォルダ内のPDFをまとめて検索対象に追加するメニュー項目を表示します。</span>
        </span>
      </label>

      <label class="pb-toggle" style="margin-top: 16px;">
        <input id="fastThumbs" type="checkbox" />
        <span class="pb-toggle-track"><span class="pb-toggle-thumb"></span></span>
        <span class="pb-toggle-text">
          <span class="pb-toggle-title">高速サムネイル表示</span>
          <span class="pb-toggle-desc">図面の縮小画像（300px）を暗号化して検索サーバーに保存し、ギャラリー・検索結果のサムネイル表示を高速化します。復号鍵はこのプラグイン設定にのみ保存され、サーバー側ではサムネイルを復号できません。有効化後に登録・再登録した図面から適用されます。</span>
        </span>
      </label>
    </div>
  </div>

  <details id="advancedSettings" class="pb-advanced">
    <summary class="pb-advanced-summary">詳細設定（通常は変更不要）</summary>
    <div class="pb-advanced-body">
      <label class="pb-field">
        <span>API Base URL</span>
        <input id="apiBaseUrl" type="url" placeholder="https://drawing-similarity-api-939943665629.asia-northeast1.run.app" />
        <div class="pb-hint" style="margin-top: -2px;">未入力の場合は標準のサーバーに自動接続します。開発・検証時のみ変更してください。</div>
      </label>
    </div>
  </details>

  <div class="pb-actions">
    <button id="cancel" type="button" class="pb-btn pb-btn-ghost">キャンセル</button>
    <button id="save" type="button" class="pb-btn pb-btn-primary">保存する</button>
  </div>
</section>
